name: Pull Request Validation

on:
  pull_request:
    branches:
    - main

permissions:
  contents: read

jobs:

  helm-validation:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        app:
        - frontend
        - payment
        - inventory
        - notification

    steps:

    - uses: actions/checkout@v4

    - uses: azure/setup-helm@v4

    - run: |
        helm dependency update applications/${{ matrix.app }}

    - run: |
        helm lint applications/${{ matrix.app }}

    - run: |
        helm template \
          ${{ matrix.app }} \
          applications/${{ matrix.app }} \
          >/dev/null
